name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * 0"

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build sqlite3 libsqlite3-dev g++

      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  docker-amd64-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/amd64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-amd64 \
          scripts/fuzzpilot_docker.sh build

      - name: Preflight
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/amd64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-amd64 \
          FUZZPILOT_REQUIRE_CANONICAL_PLATFORM=1 \
          scripts/fuzzpilot_docker.sh preflight --canonical

      - name: Smoke
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/amd64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-amd64 \
          FUZZPILOT_SMOKE_BUDGET_SEC=5 \
          scripts/fuzzpilot_docker.sh smoke

  docker-arm64-smoke:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/arm64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-arm64 \
          scripts/fuzzpilot_docker.sh build

      - name: Preflight
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/arm64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-arm64 \
          scripts/fuzzpilot_docker.sh preflight

      - name: Smoke
        run: |
          FUZZPILOT_DOCKER_PLATFORM=linux/arm64 \
          FUZZPILOT_DOCKER_IMAGE=fuzzpilot:ci-arm64 \
          FUZZPILOT_SMOKE_BUDGET_SEC=5 \
          scripts/fuzzpilot_docker.sh smoke
