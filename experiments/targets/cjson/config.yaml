project: "cJSON_fuzz"
target:
  name: "cjson_parser"
  binary: "experiments/targets/cjson/cjson_fuzzer"
  input_dir: "experiments/targets/cjson/seeds"
  dict: ""
  args: ["@@"]
  timeout_ms: 1000
  memory_mb: 1024

afl:
  base_env:
    AFL_MAP_SIZE: "65536"
    AFL_NO_UI: "1"
    AFL_SKIP_CPUFREQ: "1"
  main_budget_sec: 120
  plateau_window_sec: 10

fuzzer:
  engine: "afl++"
  threads: 1
  timeout_ms: 1000

plateau:
  window_sec: 10
  threshold_execs: 50
  threshold_paths: 1

micro_campaign:
  budget_sec: 20
  num_candidates: 4

mutation_strategy:
  enabled: true
  recipe_store: "work_cjson/recipes"
  custom_mutator_path: "./build/mutators/fuzzpilot/libfuzzpilot_mutator"

static_analysis:
  enabled: false
  backend: "ghidra"
  python_bin: "python3"
  ghidra_home: "/opt/ghidra"
  extractor_script: "scripts/ghidra/FuzzPilotGhidraExtract.java"
  timeout_sec: 120

model_api:
  provider: "openai-compatible"
  endpoint: "https://api.deepseek.com/chat/completions"
  model: "deepseek-chat"
  api_key_env: "FUZZPILOT_MODEL_API_KEY"
